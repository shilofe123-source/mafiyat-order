<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>משוב — מאפיית השומרון</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🥐</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Heebo', sans-serif; direction: rtl; background: #FFF8F0; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 16px; }
  .card { background: #fff; border-radius: 20px; padding: 32px 24px; width: 100%; max-width: 420px; box-shadow: 0 4px 30px rgba(92,61,46,0.1); text-align: center; }
  .logo { width: 72px; height: 72px; border-radius: 50%; border: 3px solid #F0E0CC; object-fit: cover; margin-bottom: 12px; }
  h1 { color: #5C3D2E; font-size: 22px; font-weight: 700; margin-bottom: 4px; }
  .subtitle { color: #8D6E63; font-size: 14px; margin-bottom: 24px; }
  .rating-group { margin-bottom: 20px; text-align: right; }
  .rating-group label { display: block; color: #5C3D2E; font-size: 15px; font-weight: 700; margin-bottom: 8px; }
  .stars { display: flex; gap: 6px; direction: ltr; }
  .stars button { width: 40px; height: 40px; border-radius: 50%; border: 2px solid #F0E0CC; background: #FFF8F0; font-size: 20px; cursor: pointer; transition: all 0.2s; line-height: 1; }
  .stars button.active { background: #C8956C; border-color: #C8956C; color: #fff; }
  .stars button:hover { border-color: #C8956C; }
  .comment-field { width: 100%; padding: 12px 14px; border: 2px solid #F0E0CC; border-radius: 12px; font-size: 14px; font-family: 'Heebo', sans-serif; min-height: 80px; resize: vertical; outline: none; direction: rtl; color: #3E2723; background: #FFF8F0; margin-bottom: 20px; }
  .comment-field:focus { border-color: #C8956C; }
  .btn { width: 100%; padding: 14px; border-radius: 12px; border: none; background: #5C3D2E; color: #fff; font-size: 16px; font-weight: 700; cursor: pointer; font-family: 'Heebo', sans-serif; transition: background 0.2s; }
  .btn:hover { background: #7B5B4C; }
  .btn:disabled { background: #ccc; cursor: not-allowed; }
  .msg { font-size: 13px; margin-top: 12px; min-height: 20px; }
  .msg.error { color: #c62828; }
  .msg.success { color: #2e7d32; }
  .thank-you { display: none; text-align: center; }
  .thank-you h2 { color: #5C3D2E; font-size: 24px; margin: 16px 0 8px; }
  .thank-you p { color: #8D6E63; font-size: 15px; }
</style>
</head>
<body>

<div class="card">
  <!-- Survey Form -->
  <div id="survey-form">
    <img class="logo" src="images/product1.jpeg" alt="logo" onerror="this.style.display='none'">
    <h1>מאפיית השומרון</h1>
    <p class="subtitle">נשמח לשמוע את דעתכם</p>

    <div class="rating-group">
      <label>חוויה כללית</label>
      <div class="stars" data-field="overall"></div>
    </div>
    <div class="rating-group">
      <label>איכות המאכלים</label>
      <div class="stars" data-field="food"></div>
    </div>
    <div class="rating-group">
      <label>שירות</label>
      <div class="stars" data-field="service"></div>
    </div>

    <textarea class="comment-field" id="comment" placeholder="רוצים לשתף עוד משהו?"></textarea>

    <button class="btn" id="submit-btn" onclick="submitFeedback()">שליחת משוב</button>
    <p class="msg" id="msg"></p>
  </div>

  <!-- Thank You View -->
  <div id="thank-you" class="thank-you">
    <div style="font-size: 48px; margin-bottom: 8px;">&#10084;&#65039;</div>
    <h2>תודה רבה!</h2>
    <p>המשוב שלכם חשוב לנו ועוזר לנו להשתפר</p>
  </div>
</div>

<script>
const SHEETS_URL = "https://script.google.com/macros/s/AKfycbyrMfxn0CiEa0U7IEfn12nxZMYmIIudBELP8Zbc2Gc0QkliVsELJV7iwMG7As5QKSRT/exec";
var ratings = { overall: 0, food: 0, service: 0 };
var orderId = new URLSearchParams(window.location.search).get("order") || "";

// Build star buttons
document.querySelectorAll(".stars").forEach(function(container) {
  var field = container.dataset.field;
  for (var i = 1; i <= 5; i++) {
    var btn = document.createElement("button");
    btn.textContent = i;
    btn.dataset.value = i;
    btn.addEventListener("click", function() {
      var val = parseInt(this.dataset.value);
      var f = this.parentElement.dataset.field;
      ratings[f] = val;
      this.parentElement.querySelectorAll("button").forEach(function(b) {
        b.classList.toggle("active", parseInt(b.dataset.value) <= val);
      });
    });
    container.appendChild(btn);
  }
});

async function submitFeedback() {
  var msg = document.getElementById("msg");
  var btn = document.getElementById("submit-btn");

  if (!ratings.overall) {
    msg.className = "msg error";
    msg.textContent = "נא לדרג את החוויה הכללית";
    return;
  }

  btn.disabled = true;
  btn.textContent = "שולח...";
  msg.textContent = "";

  try {
    var res = await fetch(SHEETS_URL, {
      method: "POST",
      body: JSON.stringify({
        action: "saveFeedback",
        orderId: orderId,
        overall: ratings.overall,
        food: ratings.food,
        service: ratings.service,
        comment: document.getElementById("comment").value
      })
    });
    var data = await res.json();

    if (data.success) {
      document.getElementById("survey-form").style.display = "none";
      document.getElementById("thank-you").style.display = "block";
    } else {
      msg.className = "msg error";
      msg.textContent = "שגיאה בשמירה — נסו שוב";
    }
  } catch {
    msg.className = "msg error";
    msg.textContent = "שגיאת רשת — נסו שוב";
  }

  btn.disabled = false;
  btn.textContent = "שליחת משוב";
}
</script>
</body>
</html>
