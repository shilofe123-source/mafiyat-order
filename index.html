function normalizePhone(raw) {
  if (!raw) return null;
  var p = raw.replace(/[\s\-()]/g, "");
  if (p.startsWith("+")) p = p.substring(1);
  if (p.startsWith("0")) p = "972" + p.substring(1);
  return /^\d{10,15}$/.test(p) ? p : null;
}

async function generatePdfAndShare(elementId, filename, phone, message) {
  const waOpen = (msg) => phone && window.open("https://wa.me/" + phone + "?text=" + encodeURIComponent(msg || ""), "_blank");
  var el = document.getElementById(elementId);
  if (!el || typeof html2pdf === "undefined") { waOpen(message); return; }
  var origStyle = el.style.cssText;
  try {
    el.style.maxHeight = "none"; el.style.overflow = "visible";
    var blob = await html2pdf().set({
      margin: [10, 6, 10, 6], filename,
      image: { type: "jpeg", quality: 0.95 },
      html2canvas: { scale: 2, useCORS: true, letterRendering: true, scrollY: 0 },
      jsPDF: { unit: "mm", format: "a4", orientation: "portrait" },
      pagebreak: { mode: ["css", "legacy"] }
    }).from(el).outputPdf("blob");
    el.style.cssText = origStyle;
    var file = new File([blob], filename, { type: "application/pdf" });
    if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
      try { await navigator.share({ files: [file], title: filename, text: message }); return; } catch(e) {}
    }
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a"); a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
    if (phone) setTimeout(() => waOpen(message + "\n\nהקובץ הורד למכשיר — צרף אותו כאן"), 800);
  } catch(e) {
    el.style.cssText = origStyle;
    waOpen(message);
  }
}

// -- [EMAIL] PDF base64 for email — remove this block when switching to WhatsApp --
async function generatePdfBase64(elementId) {
  var el = document.getElementById(elementId);
  if (!el || typeof html2pdf === "undefined") return null;
  var origStyle = el.style.cssText;
  try {
    el.style.maxHeight = "none"; el.style.overflow = "visible";
    var buf = await html2pdf().set({
      margin: [10,6,10,6], image:{type:"jpeg",quality:0.95},
      html2canvas:{scale:2,useCORS:true,letterRendering:true,scrollY:0},
      jsPDF:{unit:"mm",format:"a4",orientation:"portrait"},
      pagebreak:{mode:["css","legacy"]}
    }).from(el).outputPdf("arraybuffer");
    el.style.cssText = origStyle;
    var bin=""; var bytes = new Uint8Array(buf);
    for (var i=0; i<bytes.byteLength; i++) bin += String.fromCharCode(bytes[i]);
    return btoa(bin);
  } catch(e) { el.style.cssText = origStyle; return null; }
}

                    <div style=${{ fontSize: 14, fontWeight: 700, color: C.pri, marginTop: 2 }}>${fmt(p.price)}</div>
                  </div>
                </div>
              `;
            })}
          </div>
        </div>

        <div style=${cS}>
          <h3 style=${{ margin: "0 0 10px", fontSize: 15, color: C.pri }}>📝 ההזמנה שלי (${items.length})</h3>
          ${items.length === 0 ? html`
            <div style=${{ textAlign: "center", padding: 50, color: C.creamB }}>
              <div style=${{ fontSize: 40, marginBottom: 8 }}>🥐</div>
              <div>בחרו מוצרים מהתפריט</div>
            </div>
          ` : html`
            <div style=${{ maxHeight: 320, overflowY: "auto", WebkitOverflowScrolling: "touch" }}>
              ${items.map(it => html`
                <div key=${it.id} style=${{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 0", borderBottom: "1px solid " + C.creamD }}>
                  <div style=${{ flex: 1 }}>
                    <div style=${{ fontSize: 14, fontWeight: 600, color: C.txt }}>${it.name}</div>
                    ${it.options && it.options.length > 0 && html`<div style=${{ fontSize: 11, color: C.acc }}>${it.options.join(", ")}</div>`}
                    <div style=${{ fontSize: 12, color: C.txtL }}>${fmt(it.price)} × ${it.qty} = ${fmt(it.price * it.qty)}</div>
                  </div>
                  <div style=${{ display: "flex", alignItems: "center", gap: 6 }}>
                    <button onClick=${e => { e.stopPropagation(); updateQty(it.id, it.qty - 1); }} style=${qS}>−</button>
                    <span style=${{ minWidth: 24, textAlign: "center", fontWeight: 700, color: C.pri }}>${it.qty}</span>
                    <button onClick=${e => { e.stopPropagation(); updateQty(it.id, it.qty + 1); }} style=${qS}>+</button>
                    <button onClick=${e => { e.stopPropagation(); removeItem(it.id); }} style=${{ width: 44, height: 44, borderRadius: "50%", border: "none", background: "#fee2e2", cursor: "pointer", fontSize: 20, display: "flex", alignItems: "center", justifyContent: "center", color: "#dc2626", marginRight: 4 }}>✕</button>
                  </div>
                </div>
              `)}
            </div>
            <div style=${{ marginTop: 16, paddingTop: 14, borderTop: "2px solid " + C.creamD, display: "flex", justifyContent: "space-between", fontWeight: 800, fontSize: 20, color: C.pri }}>
              <span>סה"כ כולל מע"מ</span><span>${fmt(total)}</span>
            </div>
            <div style=${{ marginTop: 14 }}>
              <button onClick=${handleOrderAction} style=${{ padding: "14px 20px", borderRadius: 12, border: "none", background: C.pri, color: "#fff", fontSize: 15, fontWeight: 700, cursor: "pointer", width: "100%", fontFamily: "inherit", WebkitAppearance: "none" }}>✅ ביצוע ההזמנה</button>
            </div>
          `}
        </div>
      </div>

      <${GearButton} onClick=${() => setShowPinModal(true)} />

      ${showPinModal && html`
        <${PinModal}
          onClose=${() => setShowPinModal(false)}
          onSuccess=${() => { setIsEditorMode(true); showToast("✓ ברוך הבא למצב עורך"); }}
        />
      `}

      ${showApprovalModal && html`
        <${ApprovalModal}
          isEditorMode=${isEditorMode}
          discount=${discount}
          setDiscount=${setDiscount}
          totalPrice=${total}
          onConfirm=${sendToSheets}
          onClose=${() => setShowApprovalModal(false)}
        />
      `}

      ${subOptModal && html`
        <div style=${{ position: "fixed", inset: 0, background: "rgba(0,0,0,.5)", zIndex: 10000, display: "flex", alignItems: "center", justifyContent: "center", padding: 16 }} onClick=${() => setSubOptModal(null)}>
          <div style=${{ background: "#fff", borderRadius: 16, padding: "24px 20px", maxWidth: 380, width: "100%", maxHeight: "80vh", overflowY: "auto", direction: "rtl" }} onClick=${e => e.stopPropagation()}>
            <div style=${{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
              <div>
                <div style=${{ fontSize: 18, fontWeight: 700, color: C.pri }}>${subOptModal.product.name}</div>
                <div style=${{ fontSize: 13, color: C.txtL }}>${subOptModal.product.qty_desc} — ${fmt(subOptModal.product.price)}</div>
              </div>
              <button onClick=${() => setSubOptModal(null)} style=${{ border: "none", background: "none", fontSize: 22, cursor: "pointer", color: C.txtL }}>✕</button>
            </div>
            <div style=${{ fontSize: 14, fontWeight: 600, marginBottom: 10, color: C.txt }}>בחירת אפשרויות:</div>
            ${subOptModal.product.subOptions.map((opt, idx) => html`
              <label key=${idx} style=${{ display: "flex", alignItems: "center", gap: 8, padding: "8px 4px", borderBottom: "1px solid " + C.creamD, cursor: "pointer", fontSize: 14 }}>
                <input type="checkbox" checked=${subOptModal.selected.includes(opt)}
                  onChange=${() => setSubOptModal(prev => ({ ...prev, selected: prev.selected.includes(opt) ? prev.selected.filter(s => s !== opt) : [...prev.selected, opt] }))} />
                ${opt}
              </label>
            `)}
            <div style=${{ display: "flex", gap: 10, marginTop: 16 }}>
              <button onClick=${() => { addItem(subOptModal.product, subOptModal.selected); setSubOptModal(null); }}
                style=${{ flex: 1, padding: "12px 0", borderRadius: 10, border: "none", background: C.pri, color: "#fff", fontWeight: 700, fontSize: 15, cursor: "pointer" }}>
                הוסף להזמנה
              </button>
              <button onClick=${() => setSubOptModal(null)}
                style=${{ padding: "12px 16px", borderRadius: 10, border: "1px solid " + C.creamD, background: "#fff", color: C.txt, fontWeight: 600, fontSize: 14, cursor: "pointer" }}>
                ביטול
              </button>
            </div>
          </div>
        </div>
      `}

      ${items.filter(i => i.qty > 0).length > 0 && html`
        <div class="sticky-cart" onClick=${() => setView("preview")}>
          <div style=${{ display:"flex", alignItems:"center", gap:8 }}>
            <span style=${{ fontSize:20 }}>🛒</span>
            <span style=${{ fontWeight:600, color:C.priD }}>${items.filter(i => i.qty > 0).length} פריטים</span>
            <span style=${{ color:C.txtL }}>•</span>
            <span style=${{ fontWeight:700, color:C.pri }}>${fmt(total)}</span>
          </div>
          <button style=${{ padding:"10px 24px", borderRadius:10, border:"none", background:C.pri, color:"#fff", fontWeight:700, fontSize:14, cursor:"pointer" }}>המשך →</button>
        </div>
      `}

      ${toast && html`<${Toast} msg=${toast}/>`}
    </div>
  `;
}

ReactDOM.createRoot(document.getElementById("root")).render(html`<${App}/>`);
</script>
<button class="chat-bubble no-print" id="chat-bubble-btn" title="צ'אט עם האופה">💬</button>

</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
(function() {
  const TAGS = {1:["גבינה","טעים","מוצרלה"],2:["גבינה","מכובד"],3:["מאפים","טרי","בוקר"],4:["פוקצ'ה","לחם","איטלקי"],5:["כריכים","ביס","בוקר"],6:["פחזניות","קינוח","אלגנטי"],7:["פירות","בריאות","קיץ"],8:["טורטיה","ביס"],9:["מתוק","קינוח","ילדים"],10:["פיצה","ילדים","מלוח"],11:["בוריקס","מלוח","בוקר"],12:["קיש","מלוח","חמים"],13:["קרואסון","חמאה","בוקר"],14:["טורטיה","סושי","קל"],15:["ירקות","אפויים","איטלקי"],16:["גחנון","תימני","שבת","חורף"],17:["בוריקס","סביח"],18:["פריקסה","תימני","חמים"],19:["שקשוקה","ביצים","חורף"],20:["פסטה","איטלקי","חמים"],21:["סלט","טרי","בריאות"],22:["שוקולד","מתוק","ילדים"],23:["ירקות","בריאות","טבעוני"],24:["שום","לחם","צמחוני"],25:["עוגה","מתוק","בית"],26:["עוגיות","מתוק","קפה"],27:["ביצים","בוקר","מקושקשת"]};
  const QTY = {1:24,2:18,3:20,4:18,5:12,6:24,7:0,8:16,9:50,10:18,11:20,12:24,13:12,14:35,15:0,16:10,17:20,18:20,19:8,20:8,21:12,22:35,23:0,24:24,25:30,26:35,27:12};
  const PRODUCTS = (window.__PRODUCTS||[]).map(p => ({...p, qty: QTY[p.id]||0, category: p.cat, tags: TAGS[p.id]||[]}));

  const RULES = ["חורף (נובמבר-מרץ): המלץ על מנות חמות — שקשוקה, גחנון, פסטה, מקושקשת","קיץ (אפריל-אוקטובר): המלץ על פלטת פירות, מנות קרות, סלטים","ילדים קטנים: מיני פיצה, פלטת פירות, כדורי שוקולד, קוקיז","מבוגרים: פלטת גבינות, מיני קיש, שקשוקה — מנות מכובדות","צעירים: מגש מאפים, כריכוני קרואסון, מתוקים","בריאות: פלטת פירות, סלטים טריים, אנטיפסטי","לחשב 1 מנה לכל 2-3 אנשים למגשי ביס, 1 מנה לכל 4-5 אנשים למנות עיקריות","לאירוע מעל 50 איש: המלץ על מינימום 3 סוגים שונים","תמיד לציין: כשר מהדרין רבנות קרני שומרון","בסוף כל ייעוץ: להפנות לטופס ההזמנה ולהציע לעזור למלא","אם הלקוח שואל על משלוח — אמור שניתן לתאם ומחיר המשלוח ייקבע בנפרד בהתאם למרחק, יש לפנות לבת חן","לאירוע מעורב (מבוגרים + ילדים): שלב מנות מכובדות עם מתוקים וקלות לילדים","תמיד שאל לפחות: מה סוג האירוע, כמה אנשים, האם יש ילדים קטנים — לפני שממליץ","לאירוע בוקר: המלץ על כריכוני ביס, בוריקס, מקושקשת, קרואסון, ירקות טריים","לאירוע ערב/צהריים: המלץ על מגשי מאפים, מנות חמות, פלטות גבינות, קינוחים","כשהלקוח מגדיר תקציב — חשב כמויות לפי תקציב ואל תחרוג ממנו"];

  var chatHistory = [], allowFill = false, isTyping = false, isOpen = false, pendingImage = null;
  var panel = document.getElementById('ai-chat-panel');
  var msgsEl = document.getElementById('ai-chat-messages');
  var inputEl = document.getElementById('ai-chat-input');
  var sendBtn = document.getElementById('ai-chat-send');
  var toggleBtn = document.getElementById('ai-chat-toggle');
  var bubbleBtn = document.getElementById('chat-bubble-btn');
  var allowCheck = document.getElementById('ai-allow-fill');
  var attachBtn = document.getElementById('ai-chat-attach-btn');
  var fileInput = document.getElementById('ai-chat-file');
  var attachBar = document.getElementById('ai-chat-attachment');
  var attachName = document.getElementById('ai-chat-attach-name');

  function openChat() { isOpen = true; panel.classList.add('open'); panel.classList.remove('collapsed'); if(bubbleBtn) bubbleBtn.style.display='none'; setTimeout(()=>inputEl&&inputEl.focus(),300); }
  function closeChat() { isOpen = false; panel.classList.remove('open'); panel.classList.add('collapsed'); if(bubbleBtn) bubbleBtn.style.display='flex'; }
  if(bubbleBtn) bubbleBtn.addEventListener('click', openChat);

  attachBtn.addEventListener('click', function() { fileInput.click(); });
  fileInput.addEventListener('change', function() {
    var file = fileInput.files[0];
    if (!file) return;
    if (file.size > 4*1024*1024) { addMsg('system', 'הקובץ גדול מדי (מקסימום 4MB)'); fileInput.value = ''; return; }
    var reader = new FileReader();
    reader.onload = function(ev) {
      pendingImage = { base64: ev.target.result.split(',')[1], mimeType: file.type, name: file.name };
      attachName.textContent = (file.type === 'application/pdf' ? '📄 ' : '📷 ') + file.name;
      attachBar.style.display = 'block';
    };
    reader.readAsDataURL(file);
  });
  document.getElementById('ai-chat-attach-remove').addEventListener('click', function() {
    pendingImage = null; attachBar.style.display = 'none'; fileInput.value = '';
  });

  if(toggleBtn) toggleBtn.addEventListener('click', closeChat);

  allowCheck.addEventListener('change', function() {
    allowFill = allowCheck.checked;
    if (allowFill) addMsg('system', '✅ הסוכן קיבל הרשאה למלא את הטופס בשבילך');
    else addMsg('system', '🔒 הרשאת מילוי הטופס בוטלה');
  });

  function addMsg(type, text) {
    var div = document.createElement('div');
    div.className = 'chat-msg ' + type;
    div.innerHTML = text.replace(/\n/g, '<br>');
    msgsEl.appendChild(div);
    msgsEl.scrollTop = msgsEl.scrollHeight;
  }
  function showTyping() {
    var div = Object.assign(document.createElement('div'), { className:'chat-msg bot', id:'typing-indicator', innerHTML:'<span style="opacity:0.6">מקליד...</span>' });
    msgsEl.appendChild(div); msgsEl.scrollTop = msgsEl.scrollHeight;
  }
  function removeTyping() { var el = document.getElementById('typing-indicator'); if (el) el.remove(); }

  function buildSystemPrompt() {
    var productList = PRODUCTS.map(p => 'id:'+p.id+' '+p.name+' '+p.price+'שח '+p.qty_desc + (p.subOptions && p.subOptions.length ? ' [אפשרויות: '+p.subOptions.join('/')+']' : '')).join(', ');
    var info = window.BAKERY_INFO || {};
    var infoText = (info.general || []).join(' ');
    var faqText = (info.faq || []).map(function(f) { return 'שאלה: ' + f.q + ' תשובה: ' + f.a; }).join('. ');
    var fillNote = allowFill
      ? 'יש לך הרשאה למלא את הטופס. כשהלקוח מזכיר מוצרים או נותן פרטים, השב **רק** ב-JSON compact בשורה אחת (ללא טקסט לפני או אחרי, בלי markdown, בלי הסברים). פורמטים אפשריים: הוספה: {"fill": {"name":"...", "phone":"...", "date":"YYYY-MM-DD", "pickupTime":"HH:MM", "guests":"...", "eventType":"...", "items": [{"id":<id>, "qty":<כמות>}]}} הסרה: {"fill": {"removeItems": [<id1>, <id2>]}} החלפת כל העגלה: {"fill": {"replaceItems": [{"id":<id>, "qty":<כמות>}]}} חובה להשתמש ב-id הנכון מרשימת המוצרים. qty ברירת מחדל: 1. שדות לקוח שלא ידועים — אל תכלול ב-JSON. כשהלקוח אומר "תוריד/הסר/בלי X" — השתמש ב-removeItems. כשאומר "אני רוצה רק X" — השתמש ב-replaceItems.'
      : '';
    return 'אתה יועץ מקצועי של מאפיית השומרון — מומחה לתכנון מגשי אירוח. היה קצר וענייני. לשאלות פשוטות — משפט-שניים. להצעות מפורטות — מותר להאריך. דבר רק בעברית. התייחס רק לנושאי האוכל והמאפייה. כשרות: מהדרין רבנות קרני שומרון. כשלקוח מתאר אירוע — תן הצעה קונקרטית עם שמות מוצרים, כמויות ומחיר כולל. כשלקוח מבקש לשנות/להוריד/להוסיף מוצרים — בצע מיד. '
      + 'מידע חשוב: ' + infoText + ' שאלות נפוצות: ' + faqText + '. '
      + fillNote + ' מוצרים זמינים: ' + productList + '. כללים: ' + RULES.join('; ');
  }

  async function sendToAgent(userMsg, imageData) {
    try {
      var payload = { message: userMsg, history: chatHistory.slice(-10), systemPrompt: buildSystemPrompt() };
      if (imageData) payload.image = { base64: imageData.base64, mimeType: imageData.mimeType };
      var CHAT_API_URL = 'https://mafiyat-chat.fistook16.workers.dev';
      var res = await fetch(CHAT_API_URL, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload) });
      if (!res.ok) throw new Error('API error: ' + res.status);
      var data = await res.json();
      return data.response || 'מצטער, לא הצלחתי להתחבר. נסה שוב.';
    } catch(e) { console.warn('Chat API error, using local fallback:', e); return localResponse(userMsg); }
  }

  function localResponse(msg) {
    var lm = msg.toLowerCase(), m = new Date().getMonth()+1, isWinter = m>=11||m<=3;
    var guests = msg.match(/\d+/);
    var info = window.BAKERY_INFO || {};
    var faq = info.faq || [];
    for (var fi=0; fi<faq.length; fi++) { var words = faq[fi].q.split(/\s+/); if (words.filter(function(w) { return lm.includes(w); }).length >= 2) return faq[fi].a; }
    var pairs = [
      [() => lm.includes('שלום')||lm.includes('היי')||lm.includes('הי'), () => 'שלום! כמה אנשים באירוע ומתי?'],
      [() => lm.includes('כשר'), () => 'כשרות מהדרין רבנות קרני שומרון ✅'],
      [() => lm.includes('ילד'), () => 'לילדים: פיצוניות 160₪, כדורי שוקולד 180₪, פירות 250₪, קוקיז 180₪. להוסיף לטופס?'],
      [() => lm.includes('חורף')||lm.includes('קר')||(isWinter&&(lm.includes('אירוע')||lm.includes('מה'))), () => 'לחורף: שקשוקה 180₪, גחנון 180₪, קיש 195₪, מאפים 100₪. להוסיף?'],
      [() => (lm.includes('כמה')||lm.includes('כמות'))&&guests, () => { var n=parseInt(guests[0]); return 'ל-'+n+' אנשים: כ-'+Math.ceil(n/10)+' מגשי ביס, '+Math.ceil(n/15)+' קינוחים, '+Math.ceil(n/20)+' פלטות. לפרט?'; }],
      [() => lm.includes('מחיר')||lm.includes('עולה')||lm.includes('עלות'), () => 'מגשים: 100-380₪. ביס 105-195₪, מאפים 100-195₪, חמים 120-180₪, קינוחים 170-295₪.'],
      [() => lm.includes('בוקר'), () => 'לבוקר: כריכוני ביס 180₪, בוריקיטס 180₪, מקושקשת 180₪, ירקות 160₪. כמה אנשים?'],
    ];
    for (var i=0; i<pairs.length; i++) { if (pairs[i][0]()) return pairs[i][1](); }
    return 'ספר לי על האירוע — כמה אנשים, סוג ומתי?';
  }

  function fillForm(data) {
    window.__fillClientFromChat?.(data);
    if (data.removeItems?.length) window.__removeItemsFromChat?.(data.removeItems);
    else if (data.replaceItems?.length) window.__setItemsFromChat?.(data.replaceItems);
    else if (data.items?.length) window.__addItemsFromChat?.(data.items);
  }

  function extractFillJson(text) {
    var cleaned = text.replace(/```json\s*/g, '').replace(/```\s*/g, '').trim();
    var startIdx = cleaned.search(/\{\s*"fill"\s*:/);
    if (startIdx === -1) return null;
    var depth = 0, inString = false, esc = false;
    for (var i = startIdx; i < cleaned.length; i++) {
      var ch = cleaned[i];
      if (esc) { esc = false; continue; }
      if (ch === '\\' && inString) { esc = true; continue; }
      if (ch === '"') { inString = !inString; continue; }
      if (inString) continue;
      if (ch === '{') depth++;
      else if (ch === '}') { depth--; if (depth === 0) {
        try { return JSON.parse(cleaned.substring(startIdx, i + 1)); }
        catch(e) { console.warn('Fill JSON parse error:', e); return null; }
      }}
    }
    return null;
  }

  function stripJson(text) {
    return text.replace(/```json[\s\S]*?```/g, '').replace(/\{\s*"fill"\s*:[\s\S]*\}/g, '').trim();
  }

  async function handleSend() {
    var msg = inputEl.value.trim();
    if (!msg && !pendingImage) return;
    if (isTyping) return;
    inputEl.value = '';
    var img = pendingImage;
    if (img) { pendingImage = null; attachBar.style.display = 'none'; fileInput.value = ''; }
    var isPdf = img && img.mimeType === 'application/pdf';
    addMsg('user', img ? ((isPdf?'📄':'📷') + ' ' + (msg || (isPdf?'PDF':'תמונה'))) : msg);
    var prompt = msg || (isPdf ? 'קובץ PDF — חלץ הזמנה והחזר JSON עם fill' : 'תמונה — זהה מוצרים והחזר JSON עם fill');
    chatHistory.push({ role:'user', content:prompt });
    isTyping = true; showTyping();
    var response = await sendToAgent(prompt, img);
    removeTyping(); isTyping = false;
    chatHistory.push({ role:'assistant', content:response });
    if (allowFill && response.includes('"fill"')) {
      var fd = extractFillJson(response);
      if (fd && fd.fill) {
        fillForm(fd.fill);
        var f = fd.fill;
        var n = (f.removeItems||[]).length || (f.replaceItems||[]).length || (f.items||[]).length;
        var verb = f.removeItems?.length ? 'הסרתי' : f.replaceItems?.length ? 'עדכנתי' : f.items?.length ? 'הוספתי' : '';
        addMsg('bot', verb ? '✅ '+verb+' '+n+' מוצרים.' : '✅ מילאתי את הפרטים!');
        return;
      }
    }
    addMsg('bot', stripJson(response) || 'קיבלתי את הבקשה, אבל הייתה שגיאה בעיבוד. נסה שוב.');
  }

  sendBtn.addEventListener('click', handleSend);
  inputEl.addEventListener('keydown', function(e) { if (e.key === 'Enter') handleSend(); });
})();
});

</script>
