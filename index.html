<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Heebo', -apple-system, BlinkMacSystemFont, sans-serif; direction: rtl; background-color: #eaf4fb; min-height: 100vh; }
  #bg-slideshow {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: -1;
    background-size: cover; background-position: center; background-repeat: no-repeat;
    transition: background-image 1.5s ease-in-out;
  }
  #bg-slideshow::after {
    content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(234, 244, 251, 0.82);
  }
  input, textarea, button, select { font-family: inherit; font-size: 16px; }
  input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
  input[type="number"] { -moz-appearance: textfield; }
  textarea { resize: vertical; }

  .modal-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5); z-index: 200;
    display: flex; align-items: center; justify-content: center;
    padding: 16px;
  }
  .modal-box {
    background: #fff; border-radius: 18px; padding: 28px 24px;
    width: 100%; max-width: 400px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.18);
    direction: rtl;
  }

  .editor-bar {
    background: linear-gradient(90deg, #1a5c30, #5a2d82);
    color: #fff; border-radius: 12px; padding: 14px 18px;
    margin-bottom: 14px; display: flex; align-items: center;
    gap: 12px; flex-wrap: wrap;
  }


  /* ─── AI CHAT PANEL ─────────────────────────────────────────── */
  #ai-chat-panel {
    position: fixed; top: 0; right: 0; width: 340px; height: 100vh;
    background: linear-gradient(180deg, #0d3b6e 0%, #1565c0 100%);
    display: flex; flex-direction: column; z-index: 100;
    box-shadow: -4px 0 24px rgba(13,59,110,0.18);
    font-family: 'Heebo', sans-serif; direction: rtl;
    transition: transform 0.3s ease;
  }
  #ai-chat-panel.collapsed { transform: translateX(300px); }
  #ai-chat-header {
    padding: 16px 18px 12px; border-bottom: 1px solid rgba(255,255,255,0.15);
    display: flex; align-items: center; gap: 10px; background: rgba(0,0,0,0.15);
  }
  #ai-chat-header .avatar {
    width: 38px; height: 38px; background: linear-gradient(135deg, #f8f4e8, #e8dfc0);
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }
  #ai-chat-header .title { color: #fff; font-weight: 700; font-size: 15px; flex: 1; }
  #ai-chat-header .subtitle { color: rgba(255,255,255,0.65); font-size: 11px; }
  #ai-chat-toggle {
    background: none; border: none; color: rgba(255,255,255,0.7);
    cursor: pointer; font-size: 20px; padding: 4px; transition: color 0.2s;
  }
  #ai-chat-toggle:hover { color: #fff; }
  #ai-chat-messages {
    flex: 1; overflow-y: auto; padding: 14px 14px 8px;
    display: flex; flex-direction: column; gap: 10px;
    scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.2) transparent;
  }
  .chat-msg { max-width: 88%; padding: 10px 13px; border-radius: 14px; font-size: 13.5px; line-height: 1.5; word-break: break-word; }
  .chat-msg.bot { background: rgba(255,255,255,0.12); color: #fff; align-self: flex-start; border-bottom-right-radius: 4px; }
  .chat-msg.user { background: #f8f4e8; color: #0d2b40; align-self: flex-end; border-bottom-left-radius: 4px; }
  .chat-msg.system { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.5); font-size: 11px; align-self: center; text-align: center; border-radius: 8px; padding: 5px 10px; }
  #ai-chat-permission {
    padding: 10px 14px; background: rgba(255,255,255,0.07);
    border-top: 1px solid rgba(255,255,255,0.1);
    display: flex; align-items: center; gap: 8px;
  }
  #ai-chat-permission label { color: rgba(255,255,255,0.75); font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 6px; }
  #ai-chat-input-row { padding: 10px 14px 14px; display: flex; gap: 8px; border-top: 1px solid rgba(255,255,255,0.1); }
  #ai-chat-input {
    flex: 1; padding: 10px 13px; border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.25); background: rgba(255,255,255,0.1);
    color: #fff; font-size: 13px; font-family: 'Heebo', sans-serif; outline: none; direction: rtl;
  }
  #ai-chat-input::placeholder { color: rgba(255,255,255,0.4); }
  #ai-chat-input:focus { border-color: rgba(255,255,255,0.5); background: rgba(255,255,255,0.15); }
  #ai-chat-send {
    width: 40px; height: 40px; border-radius: 50%; border: none;
    background: #f8f4e8; color: #0d3b6e; font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  #ai-chat-send:hover { background: #fff; }
  #root { margin-right: 340px; flex: 1; min-height: 100vh; transition: margin-right 0.3s ease; }
  #root.chat-collapsed { margin-right: 40px; }
  @media (max-width: 900px) {
    #ai-chat-panel { width: 100%; height: 40vh; top: auto; bottom: 0; right: 0; transform: translateY(0); box-shadow: 0 -4px 24px rgba(13,59,110,0.2); }
    #ai-chat-panel.collapsed { transform: translateY(calc(100% - 48px)); }
    #root { margin-right: 0; margin-bottom: 40vh; }
    #root.chat-collapsed { margin-right: 0; margin-bottom: 48px; }
  }

  @media print {
    body { background: white !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .no-print { display: none !important; }
    #ai-chat-panel { display: none !important; }
    #bg-slideshow { display: none !important; }
    #root { margin-right: 0 !important; margin-bottom: 0 !important; }
    #root > div { padding: 0 !important; }
    #preview-card { box-shadow: none !important; border-radius: 0 !important; padding: 20px 30px !important; max-width: 100% !important; }
    #preview-card, #preview-card * { word-spacing: 0.05em; letter-spacing: 0.01em; text-rendering: geometricPrecision; }
    table { page-break-inside: avoid; }
    tr { page-break-inside: avoid; }
  }

  @media (max-width: 700px) {
    .two-col { grid-template-columns: 1fr !important; }
    .form-grid { grid-template-columns: 1fr !important; }
    .btn-row { flex-direction: column !important; }
  }
</style>

function normalizePhone(raw) {
  if (!raw) return null;
  var p = raw.replace(/[\s\-()]/g, "");
  if (p.startsWith("+")) p = p.substring(1);
  if (p.startsWith("0")) p = "972" + p.substring(1);
  if (!/^\d{10,15}$/.test(p)) return null;
  return p;
}

async function generatePdfAndShare(elementId, filename, phone, message) {
  var el = document.getElementById(elementId);
  if (!el || typeof html2pdf === "undefined") {
    if (phone) window.open("https://wa.me/" + phone + "?text=" + encodeURIComponent(message || ""), "_blank");
    return;
  }
  try {
    var origStyle = el.style.cssText;
    el.style.maxHeight = "none";
    el.style.overflow = "visible";
    var blob = await html2pdf().set({
      margin: [10, 6, 10, 6], filename: filename,
      image: { type: "jpeg", quality: 0.95 },
      html2canvas: { scale: 2, useCORS: true, letterRendering: true, scrollY: 0 },
      jsPDF: { unit: "mm", format: "a4", orientation: "portrait" },
      pagebreak: { mode: ['css', 'legacy'] }
    }).from(el).outputPdf("blob");
    el.style.cssText = origStyle;

    var file = new File([blob], filename, { type: "application/pdf" });
    if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
      try { await navigator.share({ files: [file], title: filename, text: message }); return; } catch(e) {}
    }
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a"); a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
    if (phone) setTimeout(function() { window.open("https://wa.me/" + phone + "?text=" + encodeURIComponent(message + "\n\nהקובץ הורד למכשיר — צרף אותו כאן"), "_blank"); }, 800);
  } catch(e) {
    el.style.cssText = origStyle;
    if (phone) window.open("https://wa.me/" + phone + "?text=" + encodeURIComponent(message || ""), "_blank");
  }
}

            <div style=${{ marginTop: 14 }}>

        </div>
      </div>

      <${GearButton} onClick=${() => setShowPinModal(true)} />

      ${showPinModal && html`
        <${PinModal}

          onSuccess=${() => { setIsEditorMode(true); showToast("✓ ברוך הבא למצב עורך"); }}

      `}

      ${showApprovalModal && html`
        <${ApprovalModal}

          discount=${discount}
          setDiscount=${setDiscount}
          totalPrice=${total}
          onConfirm=${sendToSheets}
          onClose=${() => setShowApprovalModal(false)}
        />
      `}

      ${toast && html`<${Toast} msg=${toast}/>`}
    </div>
  `;
}

ReactDOM.createRoot(document.getElementById("root")).render(html`<${App}/>`);
</script>

    reader.onload = function(ev) {
      pendingImage = { base64: ev.target.result.split(',')[1], mimeType: file.type, name: file.name };
      attachName.textContent = (file.type === 'application/pdf' ? '📄 ' : '📷 ') + file.name;
      attachBar.style.display = 'block';
    };
    reader.readAsDataURL(file);
  });
  document.getElementById('ai-chat-attach-remove').addEventListener('click', function() {
    pendingImage = null; attachBar.style.display = 'none'; fileInput.value = '';
  });

  toggleBtn.addEventListener('click', function() {
    isCollapsed = !isCollapsed;
    panel.classList.toggle('collapsed', isCollapsed);
    rootEl.classList.toggle('chat-collapsed', isCollapsed);
    toggleBtn.textContent = isCollapsed ? '›' : '‹';
  });

  allowCheck.addEventListener('change', function() {
    allowFill = allowCheck.checked;
    if (allowFill) addMsg('system', '✅ הסוכן קיבל הרשאה למלא את הטופס בשבילך');
    else addMsg('system', '🔒 הרשאת מילוי הטופס בוטלה');
  });

  function addMsg(type, text) {
    var div = document.createElement('div');
    div.className = 'chat-msg ' + type;
    div.innerHTML = text.replace(/\n/g, '<br>');
    msgsEl.appendChild(div);
    msgsEl.scrollTop = msgsEl.scrollHeight;
  }

  function showTyping() {
    var div = document.createElement('div');
    div.className = 'chat-msg bot';
    div.id = 'typing-indicator';
    div.innerHTML = '<span style="opacity:0.6">מקליד...</span>';
    msgsEl.appendChild(div);
    msgsEl.scrollTop = msgsEl.scrollHeight;
  }

  function removeTyping() {
    var el = document.getElementById('typing-indicator');
    if (el) el.remove();
  }

  function buildSystemPrompt() {
    var productList = PRODUCTS.map(function(p) {
      return 'id:' + p.id + ' ' + p.name + ' (' + p.price + ' שח, ' + p.qty + ' יח)';
    }).join(', ');
    var rulesList = RULES.join('; ');
    var fillNote = allowFill
      ? 'יש לך הרשאה למלא את הטופס. '
        + 'כשהלקוח מזכיר מוצרים או נותן פרטים, השב **רק** ב-JSON compact בשורה אחת (ללא טקסט לפני או אחרי, בלי markdown, בלי הסברים). פורמטים אפשריים: '
        + 'הוספה: {"fill": {"name":"...", "phone":"...", "date":"YYYY-MM-DD", "guests":"...", "eventType":"...", "items": [{"id":<id>, "qty":<כמות>}]}} '
        + 'הסרה: {"fill": {"removeItems": [<id1>, <id2>]}} '
        + 'החלפת כל העגלה: {"fill": {"replaceItems": [{"id":<id>, "qty":<כמות>}]}} '
        + 'חובה להשתמש ב-id הנכון מרשימת המוצרים. qty ברירת מחדל: 1. '
        + 'שדות לקוח שלא ידועים — אל תכלול ב-JSON. '
        + 'כשהלקוח אומר "תוריד/הסר/בלי X" — השתמש ב-removeItems. כשאומר "אני רוצה רק X" — השתמש ב-replaceItems.'
      : '';

    return 'אתה יועץ מקצועי של מאפיית השומרון — מומחה לתכנון מגשי אירוח. '
      + 'היה קצר וענייני. לשאלות פשוטות — משפט-שניים. להצעות מפורטות — מותר להאריך. '
      + 'דבר רק בעברית. התייחס רק לנושאי האוכל והמאפייה. '
      + 'כשרות: מהדרין רבנות קרני שומרון. '
      + 'כשלקוח מתאר אירוע — תן הצעה קונקרטית עם שמות מוצרים, כמויות ומחיר כולל. '
      + 'כשלקוח מבקש לשנות/להוריד/להוסיף מוצרים — בצע מיד. '
      + fillNote + ' '
      + 'מוצרים זמינים: ' + productList + '. '
      + 'כללים: ' + rulesList;
  }

  async function sendToAgent(userMsg, imageData) {
    try {
      var payload = {
        message: userMsg,
        history: chatHistory.slice(-10),
        systemPrompt: buildSystemPrompt()
      };
      if (imageData) {
        payload.image = { base64: imageData.base64, mimeType: imageData.mimeType };
      }
      var res = await fetch('https://app-84204e35.base44.app/functions/bakeryChat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      
      if (!res.ok) throw new Error('API error: ' + res.status);
      var data = await res.json();
      return data.response || 'מצטער, לא הצלחתי להתחבר. נסה שוב.';
    } catch(e) {
      console.warn('Chat API error, using local fallback:', e);
      return localResponse(userMsg);
    }
  }

  function localResponse(msg) {
    var lm = msg.toLowerCase();
    var month = new Date().getMonth() + 1;
    var isWinter = month >= 11 || month <= 3;

    if (lm.includes('שלום') || lm.includes('היי') || lm.includes('הי')) {
      return 'שלום! כמה אנשים באירוע ומתי?';
    }
    if (lm.includes('כשר') || lm.includes('כשרות')) {
      return 'כשרות מהדרין רבנות קרני שומרון ✅';
    }
    if (lm.includes('ילד') || lm.includes('ילדים')) {
      return 'לילדים: פיצוניות 160₪, כדורי שוקולד 180₪, פירות 250₪, קוקיז 180₪. להוסיף לטופס?';
    }
    if (lm.includes('חורף') || lm.includes('קר') || (isWinter && (lm.includes('אירוע') || lm.includes('מה')))) {
      return 'לחורף: שקשוקה 180₪, גחנון 180₪, קיש 195₪, מאפים 100₪. להוסיף?';
    }
    if (lm.includes('כמה') || lm.includes('כמות')) {
      var guests = msg.match(/\d+/);
      if (guests) {
        var n = parseInt(guests[0]);
        return 'ל-' + n + ' אנשים: כ-' + Math.ceil(n / 10) + ' מגשי ביס, ' + Math.ceil(n/15) + ' קינוחים, ' + Math.ceil(n/20) + ' פלטות. לפרט?';
      }
    }
    if (lm.includes('מחיר') || lm.includes('עולה') || lm.includes('עלות')) {
      return 'מגשים: 100-380₪. ביס 105-195₪, מאפים 100-195₪, חמים 120-180₪, קינוחים 170-295₪.';
    }
    if (lm.includes('בוקר') || lm.includes('ארוחת בוקר')) {
      return 'לבוקר: כריכוני ביס 180₪, בוריקיטס 180₪, מקושקשת 180₪, ירקות 160₪. כמה אנשים?';
    }
    return 'ספר לי על האירוע — כמה אנשים, סוג ומתי?';
  }

  function fillForm(data) {
    if (typeof window.__fillClientFromChat === 'function') {
      window.__fillClientFromChat(data);
    }
    if (data.removeItems && data.removeItems.length > 0 && typeof window.__removeItemsFromChat === 'function') {
      window.__removeItemsFromChat(data.removeItems);
    }
    if (data.replaceItems && data.replaceItems.length > 0 && typeof window.__setItemsFromChat === 'function') {
      window.__setItemsFromChat(data.replaceItems);
    }
    if (data.items && data.items.length > 0 && typeof window.__addItemsFromChat === 'function') {
      window.__addItemsFromChat(data.items);
    }
  }

  function extractFillJson(text) {
    var cleaned = text.replace(/```json\s*/g, '').replace(/```\s*/g, '').trim();
    var startIdx = cleaned.search(/\{\s*"fill"\s*:/);
    if (startIdx === -1) return null;
    var depth = 0, inString = false, esc = false;
    for (var i = startIdx; i < cleaned.length; i++) {
      var ch = cleaned[i];
      if (esc) { esc = false; continue; }
      if (ch === '\\' && inString) { esc = true; continue; }
      if (ch === '"') { inString = !inString; continue; }
      if (inString) continue;
      if (ch === '{') depth++;
      else if (ch === '}') { depth--; if (depth === 0) {
        try { return JSON.parse(cleaned.substring(startIdx, i + 1)); }
        catch(e) { console.warn('Fill JSON parse error:', e); return null; }
      }}
    }
    return null;
  }

  function stripJson(text) {
    return text.replace(/```json[\s\S]*?```/g, '').replace(/\{\s*"fill"\s*:[\s\S]*\}/g, '').trim();
  }

  async function handleSend() {
    var msg = inputEl.value.trim();
    if (!msg && !pendingImage) return;
    if (isTyping) return;
    inputEl.value = '';
    var img = pendingImage;
    if (img) { pendingImage = null; attachBar.style.display = 'none'; fileInput.value = ''; }

    var isPdf = img && img.mimeType === 'application/pdf';
    var icon = img ? (isPdf ? '📄' : '📷') : '';
    addMsg('user', img ? (icon + ' ' + (msg || (isPdf ? 'PDF' : 'תמונה'))) : msg);
    var fallbackPrompt = isPdf ? 'קובץ PDF — חלץ הזמנה והחזר JSON עם fill' : 'תמונה — זהה מוצרים והחזר JSON עם fill';
    chatHistory.push({ role: 'user', content: msg || fallbackPrompt });
    isTyping = true; showTyping();

    var response = await sendToAgent(msg || fallbackPrompt, img);
    removeTyping(); isTyping = false;
    chatHistory.push({ role: 'assistant', content: response });

    if (allowFill && response.includes('"fill"')) {
      var fd = extractFillJson(response);
      if (fd && fd.fill) {
        fillForm(fd.fill);
        var n = (fd.fill.removeItems||[]).length || (fd.fill.replaceItems||[]).length || (fd.fill.items||[]).length;
        var verb = (fd.fill.removeItems||[]).length ? 'הסרתי' : (fd.fill.replaceItems||[]).length ? 'עדכנתי' : (fd.fill.items||[]).length ? 'הוספתי' : '';
        addMsg('bot', verb ? '✅ ' + verb + ' ' + n + ' מוצרים.' : '✅ מילאתי את הפרטים!');
        return;
      }
    }
    var clean = stripJson(response);
    addMsg('bot', clean || 'קיבלתי את הבקשה, אבל הייתה שגיאה בעיבוד. נסה שוב.');
  }

  sendBtn.addEventListener('click', handleSend);
  inputEl.addEventListener('keydown', function(e) { if (e.key === 'Enter') handleSend(); });
})();
});

</script>

<script>
(function() {
  var BG_IMAGES = [];
  for (var i = 1; i <= 27; i++) BG_IMAGES.push('images/product' + i + '.jpeg');
  var bgEl = document.getElementById('bg-slideshow');
  var idx = Math.floor(Math.random() * BG_IMAGES.length);

  function showNext() {
    bgEl.style.backgroundImage = 'url(' + BG_IMAGES[idx] + ')';
    idx = (idx + 1) % BG_IMAGES.length;
    var preload = new Image();
    preload.src = BG_IMAGES[idx];
  }

  showNext();
  setInterval(showNext, 8000);
})();
</script>
